function log(msg, cls='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function run() {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Fixing...';
  const keys = Object.keys(DATA);
  let done = 0;
  for (const key of keys) {
    try {
      const res = await fetch(REST + "?on_conflict=key", {
        method: "POST",
        headers: {"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
        body: JSON.stringify({key, value:DATA[key], updated_at:new Date().toISOString()})
      });
      if (res.ok) {
        const s = Object.keys(DATA[key].sessions||{}).length;
        log("✅ " + key + ": " + s + " sessions (Jun 18 removed)", 'ok');
      } else {
        log("❌ " + key + ": HTTP " + res.status, 'err');
      }
    } catch(e) { log("❌ " + key + ": " + e.message, 'err'); }
    done++;
    document.getElementById('bar').style.width = (done/keys.length*100)+'%';
    await new Promise(r => setTimeout(r, 400));
  }
  log('🎉 Done! Reload your app — students now need to scan for today.', 'ok');
  btn.textContent = '✅ Fixed';
}
